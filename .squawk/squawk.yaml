templates:
  failure:
    channel: "#cliwright-alerts"
    color: "#CC0000"
    mentions:
      - "U0B8SFDPNG5"
    text: |
      🍎 *{{ .repo }}* › `{{ .branch }}` failed

      ```
      {{ .input }}
      ```

      *Please Check*
      {{ .mentions }}
      <{{ .run_url }}|View>
  success:
    channel: "#cliwright-alerts"
    color: "#36A64F"
    text: |
      🍏 *{{ .repo }}* › `{{ .branch }}` succeeded

      <{{ .run_url }}|View>
